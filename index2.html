<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShayShay Music</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    font-family: Arial, sans-serif;
    background: white;
    color: #000A1F;
    text-align:center;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

img{
    width:250px;
    border-radius:10px;
}

h1{
    color: #000A1F;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    text-decoration:none;
    border-radius:10px;
    color:#000A1F;
    background:#00d4ff;
}

.btn:hover{
    opacity:0.8;
}

audio{
    width:100%;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <img src="C4.png" alt="Song Cover">

    <h1>
      ShayShay - Care For Me
    </h1>

    <audio controls>
        <source src="Care for me.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <br>

    <a href="Care for me.mp3" download class="btn">
        <i class="fas fa-download"></i> Download
    </a>
    
        <a href="Care for me.mp3" on play class="btn">
        <i class="fas fa-play"></i> Play
    </a>

    

</div>

</body>
</html>
